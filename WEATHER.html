<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کەش و هەوای ڕاستەوخۆ</title>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --accent: #4cc9f0;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --text: #f8f9fa;
            --card-bg: rgba(255, 255, 255, 0.1);
            --card-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            transition: transform 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { border-right: 4px solid var(--success); }
        .toast.error { border-right: 4px solid var(--danger); }
        .toast.warning { border-right: 4px solid var(--warning); }

        /* سەردێڵ */
        .header {
            text-align: center;
            margin: 0 auto 40px;
            padding: 40px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--card-border);
            max-width: 900px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .header:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            font-size: 3.5em;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .last-update {
            font-size: 1.1em;
            color: var(--accent);
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .last-update i {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* بەشی گەڕان - تەنها تێکست */
        .search-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            margin: 0 auto 40px;
            max-width: 700px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
        }

        .search-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.3em;
            color: var(--accent);
        }

        .search-box {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input-wrapper {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 18px 25px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-size: 1.2em;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(76, 201, 240, 0.2);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9em;
        }

        .search-btn {
            padding: 18px 40px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid var(--card-border);
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .search-btn:hover:not(:disabled) {
            background: var(--accent);
            transform: scale(1.05);
        }

        .search-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .search-examples {
            text-align: center;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
        }

        .search-examples span {
            color: var(--accent);
            cursor: pointer;
            margin: 0 5px;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .search-examples span:hover {
            background: var(--primary);
            color: white;
        }

        /* کارتی کەشوهەوا */
        .weather-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 2px solid var(--card-border);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .weather-main {
            text-align: center;
            margin-bottom: 40px;
        }

        .city-name {
            font-size: 3.5em;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .city-name small {
            font-size: 0.3em;
            color: var(--accent);
            display: block;
        }

        .date {
            color: var(--accent);
            margin-bottom: 30px;
            font-size: 1.3em;
            font-weight: bold;
        }

        .weather-icon {
            font-size: 6em;
            margin-bottom: 20px;
            animation: weatherPulse 2s ease-in-out infinite;
        }

        @keyframes weatherPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .temperature {
            font-size: 5.5em;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .feels-like {
            font-size: 1.5em;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .weather-description {
            font-size: 2em;
            color: var(--accent);
            margin-bottom: 30px;
            font-weight: bold;
            text-transform: capitalize;
        }

        /* وردەکارییەکان */
        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 0 auto 40px;
        }

        .detail-item {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            padding: 20px 15px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease;
        }

        .detail-item:hover {
            transform: translateY(-5px);
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.1));
        }

        .detail-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .detail-label {
            font-size: 1em;
            color: rgba(255,255,255,0.8);
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.3em;
            font-weight: bold;
            color: white;
        }

        /* پێشبینی ٥ ڕۆژ */
        .forecast-title {
            text-align: center;
            font-size: 2em;
            color: white;
            margin: 40px 0 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--accent);
        }

        .forecast-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .forecast-day {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px 10px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease;
        }

        .forecast-day:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
        }

        .forecast-day .day {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .forecast-day .forecast-icon {
            font-size: 2.5em;
            margin: 10px 0;
        }

        .forecast-day .forecast-temp {
            font-size: 1.3em;
            font-weight: bold;
            color: white;
        }

        .forecast-day .forecast-desc {
            font-size: 0.9em;
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
            text-transform: capitalize;
        }

        /* لۆدینگ */
        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.5em;
        }

        .loading i {
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
        }

        /* Error Message */
        .error-message {
            text-align: center;
            padding: 40px;
            background: rgba(248, 113, 113, 0.2);
            border-radius: 15px;
            border: 1px solid var(--danger);
            color: white;
        }

        .error-message i {
            font-size: 3em;
            margin-bottom: 20px;
            display: block;
        }

        /* Recent Searches */
        .recent-searches {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .recent-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--card-border);
        }

        .recent-tag:hover {
            background: var(--primary);
            transform: scale(1.05);
        }

        /* responsive */
        @media (max-width: 900px) {
            .forecast-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 600px) {
            .forecast-container {
                grid-template-columns: 1fr;
            }
            
            .city-name {
                font-size: 2.5em;
            }
            
            .temperature {
                font-size: 4em;
            }
            
            .header h1 {
                font-size: 2.5em;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .search-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation" id="bg-animation"></div>
    
    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <span id="toastIcon">🔔</span>
        <span id="toastMessage"></span>
    </div>
    
    <div class="container">
        <!-- سەردێڵ -->
        <div class="header">
            <h1>
                <span>🏔️</span>
                کەش و هەوای جیهان
                <span>🌄</span>
            </h1>
            <p>✧ گەڕان بۆ کەشوهەوای هەر شارێک ✧</p>
            <div class="last-update" id="lastUpdate">
                <i>🕐</i>
                چاوەڕوانی نوێکردنەوە...
            </div>
        </div>

        <!-- بەشی گەڕان - تەنها تێکست -->
        <div class="search-section">
            <div class="search-title">
                <i>🔍</i> ناوی شار بنووسە (بە ئینگلیزی یان عەرەبی)
            </div>
            <div class="search-box">
                <div class="search-input-wrapper">
                    <input type="text" 
                           class="search-input" 
                           id="cityInput" 
                           placeholder="نمونە: London, Paris, New York, هەولێر, بەغدا, دوبەی..."
                           dir="auto">
                </div>
                <button class="search-btn" onclick="searchCity()" id="searchBtn">
                    <i>🔍</i>
                    گەڕان
                </button>
            </div>
            <div class="search-examples">
                <span onclick="quickSearch('London')">لەندەن</span>
                <span onclick="quickSearch('Paris')">پاریس</span>
                <span onclick="quickSearch('Dubai')">دوبەی</span>
                <span onclick="quickSearch('Erbil')">هەولێر</span>
                <span onclick="quickSearch('Istanbul')">ئیستانبول</span>
                <span onclick="quickSearch('Tokyo')">تۆکیۆ</span>
            </div>
            <div class="recent-searches" id="recentSearches"></div>
        </div>

        <!-- شوێنی پیشاندانی کەشوهەوا -->
        <div id="weatherContainer">
            <div class="weather-card" style="text-align: center; padding: 60px;">
                <i style="font-size: 4em;">🔍</i>
                <h2 style="margin: 20px 0; color: var(--accent);">بەخێربێیت</h2>
                <p style="font-size: 1.2em;">ناوی شارێک بنووسە بۆ بینینی کەشوهەوا</p>
                <div style="margin-top: 30px; color: rgba(255,255,255,0.7);">
                    <small>نمونە: London, Paris, Erbil, Sulaymaniyah</small>
                </div>
            </div>
        </div>
    </div>

    <script>
        // کلیلی API
        const API_KEY = '1dc61ce183ec88270e635c18f433559b';
        
        // ڕێکەوتی کوردی
        const weekDays = ['یەکشەممە', 'دووشەممە', 'سێشەممە', 'چوارشەممە', 'پێنجشەممە', 'هەینی', 'شەممە'];
        const months = ['کانوونی دووەم', 'شوبات', 'ئازار', 'نیسان', 'ئایار', 'حوزەیران', 'تەمموز', 'ئاب', 'ئەیلوول', 'تشرینی یەکەم', 'تشرینی دووەم', 'کانوونی یەکەم'];

        // دوایین گەڕانەکان
        let recentSearches = JSON.parse(localStorage.getItem('recentSearches')) || [];

        // پیشاندانی toast
        function showToast(message, type = 'success', icon = '🔔') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');
            
            toast.className = `toast ${type}`;
            toastIcon.textContent = icon;
            toastMessage.textContent = message;
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // زیادکردنی بۆ دوایین گەڕانەکان
        function addToRecentSearches(city) {
            if (!city) return;
            
            // پاککردنەوەی دووبارە
            recentSearches = recentSearches.filter(c => c.toLowerCase() !== city.toLowerCase());
            
            // زیادکردنی بۆ سەرەتا
            recentSearches.unshift(city);
            
            // سنووردارکردن بۆ ٥ دانە
            if (recentSearches.length > 5) {
                recentSearches = recentSearches.slice(0, 5);
            }
            
            // پاشەکەوتکردن
            localStorage.setItem('recentSearches', JSON.stringify(recentSearches));
            
            // نوێکردنەوەی پیشاندان
            displayRecentSearches();
        }

        // پیشاندانی دوایین گەڕانەکان
        function displayRecentSearches() {
            const container = document.getElementById('recentSearches');
            if (recentSearches.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            container.innerHTML = recentSearches.map(city => 
                `<span class="recent-tag" onclick="quickSearch('${city}')">🕐 ${city}</span>`
            ).join('');
        }

        // گەڕانی خێرا
        function quickSearch(city) {
            document.getElementById('cityInput').value = city;
            searchCity();
        }

        // وەرگێڕانی بەروار
        function formatDate(timestamp, timezone) {
            const date = new Date((timestamp + timezone) * 1000);
            const weekDay = weekDays[date.getUTCDay()];
            const day = date.getUTCDate();
            const month = months[date.getUTCMonth()];
            const year = date.getUTCFullYear();
            const hours = date.getUTCHours().toString().padStart(2, '0');
            const minutes = date.getUTCMinutes().toString().padStart(2, '0');
            
            return `${weekDay}، ${day}ی ${month}ی ${year}، کاتژمێر ${hours}:${minutes}`;
        }

        // بەدەستهێنانی ئایکۆنی کەشوهەوا
        function getWeatherIcon(iconCode) {
            const icons = {
                '01d': '☀️', '01n': '🌙',
                '02d': '⛅', '02n': '☁️',
                '03d': '☁️', '03n': '☁️',
                '04d': '☁️', '04n': '☁️',
                '09d': '🌧️', '09n': '🌧️',
                '10d': '🌦️', '10n': '🌧️',
                '11d': '⛈️', '11n': '⛈️',
                '13d': '🌨️', '13n': '🌨️',
                '50d': '🌫️', '50n': '🌫️'
            };
            return icons[iconCode] || '☀️';
        }

        // نوێکردنەوەی کات
        function updateLastUpdateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('lastUpdate').innerHTML = `
                <i>🕐</i>
                دوایین نوێکردنەوە: ${hours}:${minutes}:${seconds}
            `;
        }

        // گەڕان بۆ شار
        async function searchCity() {
            const input = document.getElementById('cityInput');
            const cityName = input.value.trim();
            
            if (!cityName) {
                showToast('تکایە ناوی شارێک بنووسە', 'warning', '⚠️');
                return;
            }
            
            const container = document.getElementById('weatherContainer');
            const searchBtn = document.getElementById('searchBtn');
            
            // پیشاندانی لۆدینگ
            container.innerHTML = `
                <div class="loading">
                    <i>⏳</i>
                    گەڕان بۆ ${cityName}...
                </div>
            `;
            
            searchBtn.disabled = true;
            
            try {
                // بەدەستهێنانی کەشوهەوای ئێستا
                const weatherResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(cityName)}&appid=${API_KEY}&units=metric&lang=ku`
                );
                
                if (!weatherResponse.ok) {
                    if (weatherResponse.status === 401) {
                        throw new Error('کلیلی API نادروستە');
                    } else if (weatherResponse.status === 404) {
                        throw new Error(`"${cityName}" نەدۆزرایەوە`);
                    } else {
                        throw new Error(`هەڵە: ${weatherResponse.status}`);
                    }
                }
                
                const weatherData = await weatherResponse.json();
                
                // زیادکردن بۆ دوایین گەڕانەکان
                addToRecentSearches(weatherData.name);
                
                // بەدەستهێنانی پێشبینی
                const forecastResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(cityName)}&appid=${API_KEY}&units=metric&lang=ku`
                );
                
                if (!forecastResponse.ok) {
                    throw new Error(`هەڵە: ${forecastResponse.status}`);
                }
                
                const forecastData = await forecastResponse.json();
                
                // کۆکردنەوەی پێشبینی
                const dailyForecasts = [];
                const seenDates = new Set();
                
                for (const item of forecastData.list) {
                    const date = new Date(item.dt * 1000).toLocaleDateString();
                    if (!seenDates.has(date) && dailyForecasts.length < 5) {
                        seenDates.add(date);
                        dailyForecasts.push(item);
                    }
                }
                
                // پیشاندانی داتاکە
                displayWeather(weatherData, dailyForecasts);
                
                // نوێکردنەوەی کات
                updateLastUpdateTime();
                
                showToast(`کەشوهەوای ${weatherData.name}`, 'success', '✅');
                
            } catch (error) {
                console.error('هەڵە:', error);
                
                container.innerHTML = `
                    <div class="error-message">
                        <i>❌</i>
                        <h2>هەڵەیەک ڕوویدا</h2>
                        <p>${error.message}</p>
                        <button onclick="searchCity()" style="margin-top: 20px; padding: 10px 30px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer;">
                            <i>🔄</i> هەوڵدانەوە
                        </button>
                    </div>
                `;
                
                showToast(error.message, 'error', '❌');
            } finally {
                searchBtn.disabled = false;
            }
        }

        // پیشاندانی کەشوهەوا
        function displayWeather(data, forecast) {
            const container = document.getElementById('weatherContainer');
            
            container.innerHTML = `
                <div class="weather-card">
                    <div class="weather-main">
                        <div class="city-name">
                            🏙️ ${data.name}
                            <small>${data.sys.country}</small>
                        </div>
                        <div class="date">${formatDate(data.dt, data.timezone)}</div>
                        <div class="weather-icon">${getWeatherIcon(data.weather[0].icon)}</div>
                        <div class="temperature">
                            ${Math.round(data.main.temp)}°C
                        </div>
                        <div class="feels-like">
                            پلەی هەست پێکراو: ${Math.round(data.main.feels_like)}°C
                        </div>
                        <div class="weather-description">${data.weather[0].description}</div>
                    </div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-icon">💧</div>
                            <div class="detail-label">شێ</div>
                            <div class="detail-value">${data.main.humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-icon">💨</div>
                            <div class="detail-label">خێرایی با</div>
                            <div class="detail-value">${Math.round(data.wind.speed * 3.6)} km/h</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-icon">📊</div>
                            <div class="detail-label">پەستانی هەوا</div>
                            <div class="detail-value">${data.main.pressure} hPa</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-icon">👁️</div>
                            <div class="detail-label">بینین</div>
                            <div class="detail-value">${(data.visibility / 1000).toFixed(1)} km</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-icon">🌅</div>
                            <div class="detail-label">ڕۆژهەڵاتن</div>
                            <div class="detail-value">${new Date(data.sys.sunrise * 1000).toLocaleTimeString('ku', {hour: '2-digit', minute:'2-digit'})}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-icon">🌇</div>
                            <div class="detail-label">ڕۆژئاوا بوون</div>
                            <div class="detail-value">${new Date(data.sys.sunset * 1000).toLocaleTimeString('ku', {hour: '2-digit', minute:'2-digit'})}</div>
                        </div>
                    </div>

                    <div class="forecast-title">
                        📅 پێشبینی کەشوهەوا بۆ ٥ ڕۆژی داهاتوو
                    </div>

                    <div class="forecast-container">
                        ${forecast.map(day => {
                            const date = new Date(day.dt * 1000);
                            const dayName = weekDays[date.getDay()];
                            return `
                                <div class="forecast-day">
                                    <div class="day">${dayName}</div>
                                    <div class="forecast-icon">${getWeatherIcon(day.weather[0].icon)}</div>
                                    <div class="forecast-temp">${Math.round(day.main.temp)}°C</div>
                                    <div class="forecast-desc">${day.weather[0].description}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        // دروستکردنی پارتیکلەکان
        function createParticles() {
            const container = document.getElementById('bg-animation');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                const size = Math.random() * 10 + 5;
                const duration = Math.random() * 20 + 10;
                const delay = Math.random() * 5;
                
                const colors = ['rgba(76, 201, 240, 0.8)', 'rgba(67, 97, 238, 0.8)', 'rgba(255, 255, 255, 0.8)'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                Object.assign(particle.style, {
                    left: `${posX}%`,
                    top: `${posY}%`,
                    width: `${size}px`,
                    height: `${size}px`,
                    background: color,
                    animationDuration: `${duration}s`,
                    animationDelay: `${delay}s`,
                    opacity: Math.random() * 0.5 + 0.1
                });
                
                container.appendChild(particle);
            }
        }

        // گەڕان بە کلیکی Enter
        document.getElementById('cityInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchCity();
            }
        });

        // لە سەرەتادا
        window.onload = function() {
            createParticles();
            displayRecentSearches();
            
            // ئەگەر شارێک هەیە لە دوایین گەڕانەکان، پیشانی بدە
            if (recentSearches.length > 0) {
                document.getElementById('cityInput').placeholder = `نمونە: ${recentSearches[0]}`;
            }
            
            showToast('بەخێربێیت بۆ کەشوهەوای جیهان', 'success', '🌍');
        };
    </script>
</body>
</html>
